<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Únete a la campaña</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="formulario-container">

    <h1>🐾 Únete a nuestra campaña</h1>

    <p>
        Completa el siguiente formulario para demostrar cómo puede verse un registro en una campaña educativa.
    </p>

    <form action="resultado.html">

        <label>Nombre completo</label>
        <input type="text" placeholder="Ingrese su nombre" required>

        <label>Edad</label>
        <input type="number" min="1" max="120" placeholder="Ingrese su edad" required>

        <label>Teléfono</label>
        <input type="tel" placeholder="999999999" required>

        <label>Correo electrónico</label>
        <input type="email" placeholder="correo@ejemplo.com" required>

        <label>Dirección</label>
        <input type="text" placeholder="Ingrese su dirección" required>

        <button type="submit" class="botonGrande">
            Enviar información
        </button>

    </form>

    <br>

    <a href="index.html" class="boton">
        ← Volver al inicio
    </a>

</div>

</body>
</html>
